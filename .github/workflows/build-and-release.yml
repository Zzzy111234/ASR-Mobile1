name: Build and Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Generate debug keystore
        working-directory: android/app
        run: |
          if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore \
              -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Android Debug, OU=Android, O=Unknown, L=Unknown, ST=Unknown, C=US"
          fi

      - name: Build release APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Determine APK path
        id: apk_path
        run: |
          if [ -f "${{ steps.sign_apk.outputs.signedReleaseFile }}" ]; then
            echo "APK=${{ steps.sign_apk.outputs.signedReleaseFile }}" >> $GITHUB_OUTPUT
          else
            APK_FILE=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
            echo "APK=$APK_FILE" >> $GITHUB_OUTPUT
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASR-Mobile-release
          path: ${{ steps.apk_path.outputs.APK }}

      - name: Delete old latest tag and release
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest Release
          tag_name: latest
          files: ${{ steps.apk_path.outputs.APK }}
          body: |
            Automated build from commit [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}).

            | Detail | Value |
            |---|---|
            | Branch | `${{ github.ref_name }}` |
            | Run | #${{ github.run_number }} |
          draft: false
          prerelease: false
